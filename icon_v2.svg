<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f4c81"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff9500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Arka plan -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg2)"/>

  <!-- Kalkan şekli -->
  <path d="M128 28 L200 58 L200 138 Q200 190 128 228 Q56 190 56 138 L56 58 Z"
        fill="rgba(255,255,255,0.07)" stroke="rgba(255,215,0,0.5)" stroke-width="2"/>

  <!-- Terazi direği -->
  <rect x="124" y="56" width="8" height="100" rx="4" fill="url(#accent2)"/>
  <!-- Taban -->
  <rect x="100" y="150" width="56" height="8" rx="4" fill="url(#accent2)"/>
  <rect x="112" y="158" width="32" height="5" rx="2.5" fill="rgba(255,215,0,0.5)"/>

  <!-- Üst çubuk -->
  <rect x="68" y="72" width="120" height="7" rx="3.5" fill="url(#accent2)"/>

  <!-- Sol kefe ipleri -->
  <line x1="88" y1="79" x2="82" y2="108" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="79" x2="82" y2="108" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sol kefe -->
  <ellipse cx="75" cy="114" rx="20" ry="7" fill="rgba(255,215,0,0.25)" stroke="#ffd700" stroke-width="2"/>

  <!-- Sağ kefe ipleri -->
  <line x1="168" y1="79" x2="174" y2="108" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="188" y1="79" x2="174" y2="108" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sağ kefe -->
  <ellipse cx="181" cy="114" rx="20" ry="7" fill="rgba(255,215,0,0.25)" stroke="#ffd700" stroke-width="2"/>

  <!-- U harfi (Uzlaştırma) -->
  <text x="128" y="210" font-family="Georgia, serif" font-size="52" font-weight="bold"
        fill="url(#accent2)" text-anchor="middle" filter="url(#glow)">U</text>
</svg>
